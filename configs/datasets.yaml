# Dataset configurations for gs-sim2real
# Each entry defines a supported dataset with download info and metadata.

ggrt:
  name: GGRt
  description: >
    Pose-free Generalizable 3D Gaussian Splatting.
    GGRt enables 3D reconstruction without requiring known camera poses,
    using a generalizable feed-forward approach.
  paper_url: "https://arxiv.org/abs/2403.10147"
  source_url: "https://github.com/abdullahamdi/ggrt"
  repository: "https://github.com/abdullahamdi/ggrt"
  download_method: git_clone
  data_format: images
  datasets:
    waymo:
      description: Waymo Open Dataset driving scenes
      url: "https://waymo.com/open/"
      type: driving
    realestate10k:
      description: RealEstate10K indoor/outdoor real estate video tours
      url: "https://google.github.io/realestate10k/"
      type: indoor_outdoor
    acid:
      description: "ACID: Aerial Coastline Image Dataset"
      url: "https://infinite-nature.github.io/"
      type: aerial
  pose_free: true
  default_split: waymo

covla:
  name: CoVLA
  description: >
    Large-scale driving scene dataset with front camera images.
    Contains diverse driving scenarios for autonomous driving research.
  paper_url: "https://arxiv.org/abs/2408.10680"
  source_url: "https://huggingface.co/datasets/tier4/CoVLA_Dataset"
  repository: "https://github.com/tier4/CoVLA"
  huggingface: "tier4/CoVLA_Dataset"
  download_method: huggingface_hub
  data_format: images_jpg
  sample_url: null
  camera: front
  type: driving
  image_format: jpg

waymo:
  name: Waymo Open Dataset
  description: >
    Waymo Open Dataset - large-scale autonomous driving dataset with
    multi-camera imagery, LiDAR point clouds, and high-quality labels.
    Provides diverse urban driving scenes for 3D reconstruction.
  paper_url: "https://arxiv.org/abs/1912.04838"
  source_url: "https://waymo.com/open/"
  download_method: manual
  data_format: tfrecord
  cameras:
    - FRONT
    - FRONT_LEFT
    - FRONT_RIGHT
    - SIDE_LEFT
    - SIDE_RIGHT
  type: driving
  notes: >
    Requires agreement to Waymo Open Dataset terms of use.
    Download tfrecord files from https://waymo.com/open/download/
    and place them in the data directory.

mcd:
  name: MCD
  description: >
    Multi-Campus Dataset featuring diverse outdoor campus scenes
    captured with various camera configurations. Suitable for
    large-scale outdoor 3D reconstruction.
  paper_url: "https://arxiv.org/abs/2403.11755"
  source_url: "https://mcdviral.github.io/"
  repository: "https://github.com/mcdviral/mcdviral.github.io"
  download_method: manual
  data_format: rosbag
  sample_url: null
  url: "https://mcdviral.github.io/"
  type: outdoor_campus
  cameras:
    - stereo
    - lidar
    - imu
  environments:
    - ntu
    - kth
    - tuhh

autoware_leo_drive_bag1:
  name: Autoware Leo Drive ISUZU — all-sensors-bag1_compressed
  description: >
    Public ROS 2 bag from Autoware Foundation (Bus ODD, multi-camera + LiDAR + GNSS/INS).
    Used in this repo as the known-good outdoor smoke target. Large download (multi-GB).
  paper_url: "https://autowarefoundation.github.io/autoware-documentation/main/datasets/#leo-drive---isuzu-sensor-data"
  source_url: "https://autowarefoundation.github.io/autoware-documentation/main/datasets/#leo-drive---isuzu-sensor-data"
  download_method: aws_s3_sync
  data_format: rosbag2
  type: driving
  aws_s3_sync:
    uri: "s3://autoware-files/collected_data/2022-08-22_leo_drive_isuzu_bags/all-sensors-bag1_compressed/"

autoware_leo_drive_bag6:
  name: Autoware Leo Drive ISUZU — all-sensors-bag6_compressed
  description: >
    Public ROS 2 bag from Autoware Foundation (Bus ODD, multi-camera + LiDAR + GNSS/INS).
    Historically failed image-only COLMAP (2 registered images); target for pose-seeded reconstruction.
  paper_url: "https://autowarefoundation.github.io/autoware-documentation/main/datasets/#leo-drive---isuzu-sensor-data"
  source_url: "https://autowarefoundation.github.io/autoware-documentation/main/datasets/#leo-drive---isuzu-sensor-data"
  download_method: aws_s3_sync
  data_format: rosbag2
  type: driving
  aws_s3_sync:
    uri: "s3://autoware-files/collected_data/2022-08-22_leo_drive_isuzu_bags/all-sensors-bag6_compressed/"

autoware_leo_drive_bag4:
  name: Autoware Leo Drive ISUZU — all-sensors-bag4_compressed
  description: >
    Public ROS 2 bag from Autoware Foundation (Bus ODD, multi-camera + LiDAR + GNSS/INS).
    Different route than bag6; used as alternate outdoor demo source.
  paper_url: "https://autowarefoundation.github.io/autoware-documentation/main/datasets/#leo-drive---isuzu-sensor-data"
  source_url: "https://autowarefoundation.github.io/autoware-documentation/main/datasets/#leo-drive---isuzu-sensor-data"
  download_method: aws_s3_sync
  data_format: rosbag2
  type: driving
  aws_s3_sync:
    uri: "s3://autoware-files/collected_data/2022-08-22_leo_drive_isuzu_bags/all-sensors-bag4_compressed/"

autoware_leo_drive_bag2:
  name: Autoware Leo Drive ISUZU — all-sensors-bag2_compressed
  description: >
    Public ROS 2 bag from Autoware Foundation (Bus ODD, multi-camera + LiDAR + GNSS/INS).
    Longer drive (~1200 camera frames total) suited to Gaussian Splatting
    with more overlapping views; used as the live outdoor demo source.
  paper_url: "https://autowarefoundation.github.io/autoware-documentation/main/datasets/#leo-drive---isuzu-sensor-data"
  source_url: "https://autowarefoundation.github.io/autoware-documentation/main/datasets/#leo-drive---isuzu-sensor-data"
  download_method: aws_s3_sync
  data_format: rosbag2
  type: driving
  aws_s3_sync:
    uri: "s3://autoware-files/collected_data/2022-08-22_leo_drive_isuzu_bags/all-sensors-bag2_compressed/"
