# 3D Gaussian Splatting with depth supervision + per-image appearance embedding.
#
# Extends training_depth.yaml by enabling a per-image RGB affine
# (scale, bias) that the trainer optimizes alongside the Gaussian
# parameters. Used to absorb exposure / white-balance differences when
# fusing multiple bags captured on different days or with different
# camera gains.
#
# The rendered image is transformed as ``clamp(scale * rendered + bias)``
# before the L1 / SSIM loss. Regularisation keeps (scale, bias) close to
# identity so the gaussians still carry most of the signal.

num_iterations: 30000
batch_size: 1
seed: 42

learning_rate:
  position: 0.00016
  feature: 0.0025
  opacity: 0.05
  scaling: 0.005
  rotation: 0.001

lr_schedule:
  position_lr_init: 0.00016
  position_lr_final: 0.0000016
  position_lr_delay_mult: 0.01
  position_lr_max_steps: 30000

sh_degree: 3

densify_from_iter: 500
densify_until_iter: 15000
densify_interval: 100
densify_grad_threshold: 0.0002

opacity_reset_interval: 3000
min_opacity: 0.005

percent_dense: 0.01
max_screen_size: 40

lambda_dssim: 0.2

depth_loss_weight: 0.1

appearance_embedding: true
appearance_lr: 0.001
appearance_reg_weight: 0.01

save_iterations: [10000, 20000, 30000]
test_iterations: [10000, 20000, 30000]

resolution: -1
white_background: false
